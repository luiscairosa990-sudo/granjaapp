{% extends "base.html" %}
{% block title %}Login - GranjaApp{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-4 col-sm-10">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-egg-fried text-success" style="font-size: 3.5rem;"></i>
                    <h3 class="mt-2 fw-bold text-success">GranjaApp</h3>
                    <p class="text-muted small">Sistema de Gestión Avícola</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="user" class="form-control form-control-lg" required autofocus autocomplete="username">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control form-control-lg" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-success w-100 btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Ingresar
                    </button>
                </form>

        
        <!-- AQUI ANTES ESTABAN LAS CREDENCIALES VISIBLES - YA ELIMINADAS -->
        
        <p class="text-center text-muted mt-3" style="font-size: 12px;">
            © 2024 GranjaApp - Todos los derechos reservados
        </p>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
